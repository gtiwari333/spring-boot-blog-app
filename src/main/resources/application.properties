# Security configuration
quarkus.security.auth.form.enabled=true
quarkus.security.auth.form.login-page=/login
quarkus.security.auth.form.error-page=/login?error
quarkus.security.auth.form.landing-page=/
quarkus.security.auth.form.post-location=true

# OIDC configuration (if using OpenID Connect)
# quarkus.oidc.enabled=true
# quarkus.oidc.auth-server-url=http://localhost:8080/auth/realms/quarkus
# quarkus.oidc.client-id=quarkus-app
# quarkus.oidc.credentials.secret=secret

# Basic authentication (alternative)
quarkus.security.basic=true
quarkus.security.basic.realm=Quarkus Realm

# CORS configuration
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

# Session configuration
quarkus.http.auth.session.encryption-key=CHANGE-ME-PLEASE-1234567890
quarkus.http.auth.session.timeout=PT30M
