<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{_fragments/header :: head(~{:: title}, ~{:: .custom-link})}">
    <title> Note App - HOME</title>
    <!-- we can do the following to add extra css on this page -->
    <link class="custom-link" th:href="@{/static/css/some-custom-this-page-only.css}"/>
</head>
<body>

<div th:replace="~{_fragments/header :: headerbar}"></div>


<div class="container">
    <div class="card-deck mb-3">
        <div class="px-4 py-3" style="width: 100%">

            <!-- Welcome Header for Anonymous Users -->
            <div sec:authorize="isAnonymous()" style="text-align: center; margin-bottom: 25px;">
                <h1 style="color: #2d3748; font-weight: 800; font-size: 2rem; margin-bottom: 10px;">Welcome to Note App</h1>
                <p style="color: #718096; font-size: 1rem;">Create, share, and organize your notes beautifully</p>
            </div>

            <div th:if="${param.logout} != null">
                <div class="alert alert-success" role="alert">
                    <span>✅ You have been signed out successfully</span>
                </div>
            </div>

            <div th:if="${success} != null">
                <div class="alert alert-success" role="alert">
                    <span th:text="${success}"></span>
                </div>
            </div>

            <div sec:authorize="isAuthenticated()">
                <h3 style="color: #2d3748; margin-bottom: 15px; font-weight: 700;">✨ Create a New Note</h3>
                <form action="#" method="post" th:action="@{/note/add}" th:object="${note}"
                      enctype="multipart/form-data">
                    <div th:replace="~{note/_notes :: note-editor}"></div>

                    <button class="btn btn-primary btn-block" type="submit" id="postNote-btn"
                            style="padding: 10px; font-size: 1rem; border-radius: 8px;">
                        📝 Post Note
                    </button>
                </form>
                <hr style="margin: 25px 0;"/>
                <h3 style="color: #2d3748; margin-bottom: 15px; font-weight: 700;">📚 Recent Notes</h3>
            </div>

            <th:block th:each="note : ${notes}">
                <th:block th:replace="~{note/_notes :: note-box}">

                </th:block>
            </th:block>

            <div th:if="${notes.getTotalElements() ==0}">
                <div class="alert alert-warning" role="alert"
                     style="text-align: center; padding: 20px; font-size: 1rem;">
                    <span>📭 No notes available yet. Be the first to create one!</span>
                </div>
            </div>

            <div th:replace="~{_fragments/pagination :: pager(${notes}, '/')}"></div>
        </div>
    </div>

    <div th:replace="~{_fragments/footer :: page-footer}" th:remove="tag"></div>

</div>

<div th:replace="~{_fragments/footer :: js-imports(~{::.custom-script})}">
    <script class="custom-script" th:src="@{/static/js/custom.js}"></script>
</div>

</body>
</html>
