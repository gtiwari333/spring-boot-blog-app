<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5"
      xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title, links)">
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport">
    <meta content="" name="description">
    <meta content="" name="author">
    <meta content="" name="generator">
    <title th:replace="${title}"> Title ...</title>

    <link href="/webjars/bootstrap/4.5.0/css/bootstrap.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/static/css/wro-commons.css}"/>
    <link rel="stylesheet" th:href="@{/static/css/app.css}"/>
    <link rel="stylesheet" th:href="@{/static/css/templates.css}"/>

    <th:block th:replace="${links}"/>

</head>
<body>

<div th:fragment="headerbar">

    <nav class="navbar navbar-dark navbar-expand-md bg-faded justify-content-center navbar-main">
        <a class="navbar-brand d-flex w-50 mr-auto navbar-brand-title" th:href="@{/}">
            <span>Note App</span>
        </a>

        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#collapsingNavbar3">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="navbar-collapse collapse w-100" id="collapsingNavbar3">

            <ul class="nav navbar-nav ml-auto w-100 justify-content-end">
                <li class="nav-item mx-auto" sec:authorize="isAuthenticated()">
                    <a class="nav-link nav-link-notes" th:href="@{/note}" id="user-note-link">
                        <span sec:authentication="name">Notes</span>'s Notes
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link nav-link-auth" th:href="@{/login}" id="login-link">
                        Login
                    </a>
                </li>

                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link nav-link-signup" th:href="@{/signup}" id="signup-link">
                        Signup
                    </a>
                </li>
            </ul>

            <ul class="nav navbar-nav ml-auto w-100 justify-content-end" sec:authorize="isAuthenticated()">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle nav-link-user-menu" href="#" id="navbarDropdownMenuLink" data-toggle="dropdown">
                        <span sec:authentication="principal.username">USER_NAME</span>
                    </a>
                    <div class="dropdown-menu dropdown-menu-right dropdown-menu-styled">
                        <a class="dropdown-item dropdown-item-styled" th:href="@{/password}" id="change-password-link">
                            Change Password
                        </a>
                        <a class="dropdown-item dropdown-item-styled" th:href="@{/profile}" id="profile-link">
                            Profile
                        </a>
                        <form th:action="@{/auth/logout}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="dropdown-item dropdown-item-logout" id="logout-link">Logout</button>
                        </form>
                    </div>
                </li>
            </ul>
        </div>
    </nav>

</div>

</body>
</html>
