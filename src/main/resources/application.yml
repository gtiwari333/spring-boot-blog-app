quarkus:
    # application.name
    application:
        name: "Seed App - An example of professional spring project"

    # jpa.show-sql
    hibernate-orm:
        log:
            sql: false
        # hibernate.globally_quoted_identifiers
        interceptor: gt.app.domain.AuditInterceptor
        database:
            globally-quoted-identifiers: true

    # jpa.open-in-view (Quarkus disables this by default for performance)
    # There is no direct "enable" flag because Quarkus enforces better patterns.

    # mail properties
    mailer:
        host: localhost
        port: ${MAILHOG_PORT:1025}
        # username and password left blank as per original

    # threads.virtual.enabled
    # In Quarkus, this is handled by the underlying thread pool
    virtual-threads:
        enabled: true

    # server.port
    http:
        port: 8080

    # logging configuration
    log:
        level: INFO
        # Minimum log level must be set to allow DEBUG runtime logs
        min-level: DEBUG

        # Specific package levels (categories)
        category:
            # Use quotes if the key contains dots to ensure correct mapping
            "org.springframework.web":
                level: INFO
            "org.springframework.security":
                level: INFO
            "org.springframework.security.web":
                level: INFO
            "org.hibernate":
                level: INFO
            "gt":
                level: DEBUG



# custom properties for this project
app-properties:
    file-storage:
        upload-folder: ${java.io.tmpdir}


spring-doc:
    show-actuator: true

