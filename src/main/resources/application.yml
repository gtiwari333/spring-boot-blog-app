spring:
    application:
        name: Seed App - An example of professional spring project
    jpa:
        show-sql: false
        open-in-view: false
        properties:
            hibernate.globally_quoted_identifiers: true
            # Startup optimizations — skip hbm.xml scanning (use annotations only)
            hibernate.archive.autodetection: class
            # JDBC batch inserts (reduces DataCreator seeding time from ~7s to ~1s), also helps with any bulk operation
            hibernate.jdbc.batch_size: 100
            hibernate.order_inserts: true
    mail:
        host: localhost
        port: ${MAILHOG_PORT:1025}
        username:
        password:
    main:
        # Lazy init drastically reduces startup time by deferring bean creation to first use.
        # Beans annotated with @Lazy(false) or consumed by non-lazy beans are still created eagerly.
        # If specific beans must be eagerly initialized, annotate them with @Lazy(false).
        lazy-initialization: true
    jmx:
        # Startup optimization — skip JMX registration for every bean
        enabled: false
    threads:
        virtual:
            enabled: true
    mvc:
        log-request-details: false
        publish-request-handled-events: false

server:
    port: 8080

logging.level:
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.springframework.security.web: INFO
    org.hibernate: INFO
    ROOT: INFO
    gt: DEBUG


wro4j:
    jmx-enabled: false
    debug: true
    manager-factory:
        pre-processors: removeSourceMaps, cssUrlRewriting, cssImport, cssMinJawr, semicolonAppender, jsMin
    filter-url: /wro4j # this is the default, needs to be used in secConfig and the htmls


# custom properties for this project
app-properties:
    file-storage:
        upload-folder: ${java.io.tmpdir}


spring-doc:
    show-actuator: true

